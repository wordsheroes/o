<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eyefind Autos</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#d9ecff;
}

.topbar{
    background:#2b6cb0;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.banner{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

.cards{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    cursor:pointer;
}

.card-content{
    padding:15px;
}

.card-content h3{
    margin:0;
    color:#2b6cb0;
}

.price{
    font-weight:bold;
    margin-top:10px;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    background:#2b6cb0;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.footer{
    margin-top:40px;
    text-align:center;
    padding:20px;
    color:#2b6cb0;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">

<div class="logo">eyefind.info</div>

<button onclick="location.href='admin.html'">
ADMIN
</button>

</div>

<div class="container">

<div class="banner">
<h1>WELCOME TO EYEFIND AUTOS</h1>
<p>Luxury cars marketplace</p>
</div>

<div class="cards" id="cars"></div>

<div class="footer">
Copyright © 2026 eyefind.info
</div>

</div>

<script>

let cars = JSON.parse(localStorage.getItem("cars")) || [];
let container = document.getElementById("cars");

function load(){

container.innerHTML = "";

cars.forEach((c,i)=>{

container.innerHTML += `
<div class="card">

<img src="${c.images?.[0] || ''}" onclick="openCar(${i})">

<div class="card-content">

<h3>${c.name || 'No Name'}</h3>

<div class="price">${c.price || ''}</div>

<button onclick="openCar(${i})">
VIEW DETAILS
</button>

</div>
</div>
`;

});

}

function openCar(i){
localStorage.setItem("selectedCar",i);
location.href="car.html";
}

load();

</script>

</body>
</html>
