<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سيارات Eyefind</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#d9ecff;
    overflow-x: hidden;
}

.topbar{
    background:#2b6cb0;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width: 1200px;
    margin: auto;
}

.banner{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

.cards{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card-slider {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
}

.card-slider::-webkit-scrollbar {
    display: none;
}

.card-slider img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    flex: 0 0 100%;
    scroll-snap-align: start;
}

.card-content{
    padding:15px;
}

.card-content h3{
    margin:0;
    color:#2b6cb0;
}

.price{
    font-weight:bold;
    margin-top:10px;
    color: #333;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    background:#2b6cb0;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.footer{
    margin-top:40px;
    text-align:center;
    padding:20px;
    font-weight:bold;
}

/* تنسيق الرابط في الفوتر */
.footer a {
    color:#2b6cb0;
    text-decoration: none;
}

.footer a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">eyefind.info</div>
    <button onclick="location.href='admin.html'" style="width:auto; margin:0; padding: 10px 20px;">لوحة التحكم</button>
</div>

<div class="container">
    <div class="banner">
        <h1>مرحباً بك في سيارات EYEFIND</h1>
        <p>السوق الأول للسيارات الفاخرة والمميزة</p>
    </div>

    <div class="cards" id="cars"></div>

    <div class="footer">
        <a href="terms.html">جميع الحقوق محفوظة © 2026 eyefind.info</a>
    </div>
</div>

<script>
const cars = JSON.parse(localStorage.getItem("cars")) || [];
const container = document.getElementById("cars");

function load(){
    container.innerHTML = "";

    cars.forEach((c,i)=>{
        let imagesHTML = '';
        if(c.images && c.images.length > 0) {
            c.images.forEach(imgUrl => {
                imagesHTML += `<img src="${imgUrl}">`;
            });
        } else {
            imagesHTML = `<img src="">`;
        }

        container.innerHTML += `
        <div class="card">
            <div class="card-slider">
                ${imagesHTML}
            </div>
            <div class="card-content">
                <h3>${c.name}</h3>
                <div class="price">${c.price ? c.price + " درهم" : ""}</div>
                <button onclick="openCar(${i})">عرض التفاصيل</button>
            </div>
        </div>
        `;
    });
}

function openCar(i){
    localStorage.setItem("selectedCar",i);
    location.href="car.html";
}

load();
</script>
</body>
</html>
