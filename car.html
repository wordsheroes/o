<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل السيارة</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #d9ecff;
    color: #333;
    overflow-x: hidden;
}

.topbar {
    background: #2b6cb0;
    padding: 15px 25px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    text-decoration: none;
    color: white;
}

.product-container {
    width: 92%;
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.product-container > div {
    min-width: 0; 
}

@media (max-width: 768px) {
    .product-container {
        grid-template-columns: 1fr;
        margin: 15px auto;
        padding: 15px;
    }
}

.main-image {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 10px;
    cursor: zoom-in; /* تغيير شكل الماوس ليدل على التكبير */
}

.thumbs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-top: 10px;
    padding-bottom: 5px;
}

.thumbs img {
    width: 65px;
    height: 50px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    flex-shrink: 0;
}

.thumbs img.active {
    border-color: #2b6cb0;
}

.product-info h1 {
    color: #2b6cb0;
    margin: 0;
}

.price-tag {
    font-size: 22px;
    font-weight: bold;
    color: #2b6cb0;
    margin: 10px 0;
    padding: 8px 12px;
    background: #f0f7ff;
    display: inline-block;
    border-radius: 6px;
}

.description {
    font-size: 14px;
    line-height: 1.6;
    color: #666;
    margin-bottom: 10px;
}

.specs-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 14px;
}

.specs-table td {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}

.specs-table td:first-child {
    font-weight: bold;
    color: #2b6cb0;
    width: 40%;
}

.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    text-decoration: none;
    font-weight: bold;
}

.contact {
    background: #2b6cb0;
    color: white;
}

.back {
    background: #f5c542;
    color: #333;
}

/* نافذة تكبير الصورة (Fullscreen) */
.modal {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.9);
    align-items: center;
    justify-content: center;
}

.modal img {
    max-width: 95%;
    max-height: 95%;
    object-fit: contain; /* لعرض الصورة بأبعادها الأصلية الكاملة */
    border-radius: 8px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 35px;
    color: white;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>
<body>

<header class="topbar">
    <a class="logo" href="index.html">eyefind.info</a>
    <span>تفاصيل السيارة</span>
</header>

<main class="product-container">
    <div>
        <img id="mainImg" class="main-image" onclick="openModal()">
        <div class="thumbs" id="thumbs"></div>
    </div>

    <div class="product-info">
        <h1 id="carName"></h1>
        <div class="price-tag" id="price"></div>
        <p class="description" id="desc"></p>

        <table class="specs-table">
            <tr><td>سنة الصنع</td><td id="year"></td></tr>
            <tr><td>الحالة</td><td id="condition"></td></tr>
            <tr><td>عدد المقاعد</td><td id="seats"></td></tr>
            <tr><td>المحرك</td><td id="engine"></td></tr>
            <tr><td>المسافة المقطوعة</td><td id="mileage"></td></tr>
            <tr><td>اللون</td><td id="color"></td></tr>
        </table>

        <div class="actions">
            <a href="mailto:contact@yoursite.com" class="btn contact">تواصل معنا</a>
            <a href="index.html" class="btn back">رجوع للخلف</a>
        </div>
    </div>
</main>

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="fullImg">
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [];
let i = localStorage.getItem("selectedCar");
let car = cars[i];

if(car){
    document.getElementById("carName").innerText = car.name;
    document.getElementById("price").innerText = car.price ? car.price + " درهم" : "";
    document.getElementById("desc").innerText = car.description;
    
    document.getElementById("year").innerText = car.year;
    document.getElementById("condition").innerText = car.condition;
    document.getElementById("seats").innerText = car.seats;
    document.getElementById("engine").innerText = car.engine;
    document.getElementById("mileage").innerText = car.mileage;
    document.getElementById("color").innerText = car.color;

    const mainImg = document.getElementById("mainImg");
    mainImg.src = car.images?.[0] || "";

    let thumbs = document.getElementById("thumbs");

    (car.images || []).forEach((img, idx)=>{
        let t = document.createElement("img");
        t.src = img;
        if(idx === 0) t.classList.add("active");

        t.onclick = () => {
            mainImg.src = img;
            document.querySelectorAll(".thumbs img").forEach(x => x.classList.remove("active"));
            t.classList.add("active");
        };
        thumbs.appendChild(t);
    });
}

// دوال فتح وإغلاق نافذة تكبير الصورة
function openModal() {
    const modal = document.getElementById("imageModal");
    const fullImg = document.getElementById("fullImg");
    const mainImg = document.getElementById("mainImg");
    
    if(mainImg.src) {
        fullImg.src = mainImg.src;
        modal.style.display = "flex";
    }
}

function closeModal() {
    document.getElementById("imageModal").style.display = "none";
}

// إغلاق الصورة عند الضغط في أي مكان في الخلفية السوداء
window.onclick = function(event) {
    const modal = document.getElementById("imageModal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>
</body>
</html>
