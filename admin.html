<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | الإدارة</title>
<style>
* {
    box-sizing: border-box;
}

body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#d9ecff;
    overflow-x: hidden;
}

.topbar{
    background:#2b6cb0;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.panel{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-family: inherit;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    background:#2b6cb0;
    color:white;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.item{
    background:white;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.item img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.edit{ background:orange; }
.del{ background:red; }

#loginScreen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #d9ecff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
#loginScreen .panel {
    width: 320px;
    text-align: center;
}
</style>
</head>
<body>

<div id="loginScreen">
    <div class="panel">
        <h2 style="color:#2b6cb0;">تسجيل الدخول</h2>
        <input id="adminUser" placeholder="اسم المستخدم">
        <input id="adminPass" type="password" placeholder="كلمة المرور">
        <button onclick="login()">تسجيل الدخول</button>
    </div>
</div>

<div class="topbar">
    <div class="logo">لوحة الإدارة</div>
    <button onclick="location.href='index.html'" style="width:auto; margin:0; padding: 10px 20px;">الرئيسية</button>
</div>

<div class="container">
    <div class="panel">
        <h2 style="margin-top:0; color:#2b6cb0;">إضافة / تعديل سيارة</h2>
        
        <input id="carName" placeholder="اسم السيارة">
        <input id="price" placeholder="السعر (اكتب الرقم فقط، مثلاً: 50000)">
        <textarea id="desc" placeholder="وصف السيارة" rows="3"></textarea>

        <input id="year" placeholder="سنة الصنع">
        <input id="condition" placeholder="الحالة (جديدة / مستعملة)">
        <input id="seats" placeholder="عدد المقاعد">
        <input id="engine" placeholder="المحرك (مثال: V8 5.0L)">
        <input id="mileage" placeholder="المسافة المقطوعة (كم)">
        <input id="color" placeholder="اللون">

        <input type="file" id="imgs" multiple accept="image/*" style="padding: 10px 0;">
        <button onclick="addCar()">إضافة / تحديث البيانات</button>
    </div>

    <div id="list"></div>
</div>

<script>
function login() {
    let user = document.getElementById("adminUser").value;
    let pass = document.getElementById("adminPass").value;
    if(user === "admin" && pass === "1234") {
        document.getElementById("loginScreen").style.display = "none";
    } else {
        alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
    }
}

let cars = JSON.parse(localStorage.getItem("cars")) || [];
let editIndex = null;

function save(){
    localStorage.setItem("cars",JSON.stringify(cars));
}

function addCar(){
    const files = document.getElementById("imgs").files;
    
    function finish(images){
        const car = {
            name: document.getElementById("carName").value,
            price: document.getElementById("price").value,
            description: document.getElementById("desc").value,
            year: document.getElementById("year").value,
            condition: document.getElementById("condition").value,
            seats: document.getElementById("seats").value,
            engine: document.getElementById("engine").value,
            mileage: document.getElementById("mileage").value,
            color: document.getElementById("color").value,
            images: images
        };

        if(editIndex === null){
            cars.push(car);
        }else{
            if(images.length === 0 && cars[editIndex].images) {
                car.images = cars[editIndex].images;
            }
            cars[editIndex] = car;
            editIndex = null;
        }
        save();
        load();
        clear();
    }

    if(files.length > 0){
        let images = [];
        let done = 0;
        for(let f of files){
            let reader = new FileReader();
            reader.onload = (e)=>{
                images.push(e.target.result);
                done++;
                if(done === files.length) finish(images);
            };
            reader.readAsDataURL(f);
        }
    }else{
        finish([]);
    }
}

function load(){
    let list = document.getElementById("list");
    list.innerHTML = "";
    cars.forEach((c,i)=>{
        list.innerHTML += `
        <div class="item">
            <img src="${c.images?.[0] || ''}">
            <h3>${c.name}</h3>
            <p style="font-weight:bold; color:#2b6cb0;">${c.price ? c.price + " درهم" : ""}</p>
            <button class="edit" onclick="editCar(${i})">تعديل السيارة</button>
            <button class="del" onclick="deleteCar(${i})">حذف السيارة</button>
        </div>
        `;
    });
}

function editCar(i){
    let c = cars[i];
    document.getElementById("carName").value = c.name;
    document.getElementById("price").value = c.price;
    document.getElementById("desc").value = c.description;
    document.getElementById("year").value = c.year;
    document.getElementById("condition").value = c.condition;
    document.getElementById("seats").value = c.seats;
    document.getElementById("engine").value = c.engine;
    document.getElementById("mileage").value = c.mileage;
    document.getElementById("color").value = c.color;
    editIndex = i;
    window.scrollTo({ top: 0, behavior: 'smooth' }); // الصعود للأعلى عند التعديل
}

function deleteCar(i){
    if(confirm("هل أنت متأكد من حذف هذه السيارة بشكل نهائي؟")) {
        cars.splice(i,1);
        save();
        load();
    }
}

function clear(){
    document.getElementById("carName").value="";
    document.getElementById("price").value="";
    document.getElementById("desc").value="";
    document.getElementById("year").value="";
    document.getElementById("condition").value="";
    document.getElementById("seats").value="";
    document.getElementById("engine").value="";
    document.getElementById("mileage").value="";
    document.getElementById("color").value="";
    document.getElementById("imgs").value="";
}

load();
</script>
</body>
</html>
